<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nora Agents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Georgia, serif; 
      background: #f5f0e8; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
      color: #3d1f0a;
    }
    .container { text-align: center; padding: 40px; }
    h1 { font-size: 48px; letter-spacing: 8px; margin-bottom: 10px; }
    p { font-family: Arial, sans-serif; font-size: 14px; letter-spacing: 4px; color: #8B5E3C; margin-top: 20px; }
    .dot { color: #c8a165; margin: 0 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="dot">•</span> NORA <span class="dot">•</span></h1>
    <h2 style="font-family: Arial; font-size: 16px; letter-spacing: 6px; color: #8B5E3C; font-weight: 400;">AGENTS</h2>
    <hr style="border: none; border-top: 1px solid #c8a165; margin: 20px auto; width: 300px;">
    <p>COMING SOON</p>
  </div>
</body>
</html>
